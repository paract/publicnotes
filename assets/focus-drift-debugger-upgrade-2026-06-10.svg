<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">思考が散らかってきたサインの図解</title>
  <desc id="desc">動画編集やWeb3ツール開発という本線から、思考デバッガーの改造欲へ注意が流れ、散らかり検知へ戻る構造。</desc>
  <rect width="1600" height="900" fill="#fbfaf6"/>
  <path d="M0 0h1600v900H0z" fill="#fbfaf6"/>
  <circle cx="1230" cy="170" r="230" fill="#0e7f76" opacity=".10"/>
  <circle cx="260" cy="720" r="260" fill="#c4513d" opacity=".09"/>
  <text x="800" y="90" text-anchor="middle" font-family="sans-serif" font-size="54" font-weight="700" fill="#202327">思考が散らかってきた証拠</text>
  <text x="800" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#687079">本線タスクから、魅力的な改造欲へ注意が流れる</text>

  <g font-family="sans-serif">
    <rect x="120" y="245" width="410" height="170" rx="26" fill="#fff" stroke="#d8d1c5" stroke-width="4"/>
    <text x="325" y="310" text-anchor="middle" font-size="42" font-weight="700" fill="#4059a8">詰めるべき本線</text>
    <text x="325" y="365" text-anchor="middle" font-size="28" fill="#202327">動画編集</text>
    <text x="325" y="405" text-anchor="middle" font-size="28" fill="#202327">デジタルスタンプラリー</text>

    <rect x="1070" y="245" width="410" height="170" rx="26" fill="#fff" stroke="#d8d1c5" stroke-width="4"/>
    <text x="1275" y="310" text-anchor="middle" font-size="42" font-weight="700" fill="#0e7f76">頭を占めるもの</text>
    <text x="1275" y="365" text-anchor="middle" font-size="28" fill="#202327">思考デバッガーの</text>
    <text x="1275" y="405" text-anchor="middle" font-size="28" fill="#202327">バージョンアップ</text>

    <rect x="570" y="520" width="460" height="190" rx="28" fill="#fff" stroke="#d8d1c5" stroke-width="4"/>
    <text x="800" y="590" text-anchor="middle" font-size="44" font-weight="700" fill="#c4513d">散らかり検知</text>
    <text x="800" y="645" text-anchor="middle" font-size="28" fill="#202327">面白さ・効率・自動化を</text>
    <text x="800" y="685" text-anchor="middle" font-size="28" fill="#202327">探し始めたら要注意</text>
  </g>

  <path d="M540 330 C690 260 910 260 1060 330" fill="none" stroke="#b56b2d" stroke-width="16" stroke-linecap="round"/>
  <path d="M1048 330 l-45 -34 8 58 z" fill="#b56b2d"/>
  <text x="800" y="275" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#b56b2d">魅力的な寄り道</text>

  <path d="M1275 430 C1210 560 1080 625 1040 625" fill="none" stroke="#0e7f76" stroke-width="14" stroke-linecap="round" stroke-dasharray="20 18"/>
  <path d="M325 430 C395 560 520 625 560 625" fill="none" stroke="#4059a8" stroke-width="14" stroke-linecap="round" stroke-dasharray="20 18"/>
  <path d="M560 625 l-50 -23 23 53 z" fill="#4059a8"/>
  <path d="M1040 625 l38 -42 10 58 z" fill="#0e7f76"/>

  <rect x="460" y="765" width="680" height="62" rx="31" fill="#202327"/>
  <text x="800" y="806" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">まず本線を一つだけ次の行動に戻す</text>
</svg>
